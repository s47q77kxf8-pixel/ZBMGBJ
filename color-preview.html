<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>彩条配色方案预览</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            padding: 20px;
            background: #f5f5f5;
        }
        h1 {
            text-align: center;
            margin-bottom: 30px;
            color: #333;
        }
        .mode-section {
            margin-bottom: 40px;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .mode-title {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #eee;
        }
        .color-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
        }
        .color-item {
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid #e0e0e0;
        }
        .color-bar {
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 500;
        }
        .color-info {
            padding: 10px;
            background: #fafafa;
            font-size: 12px;
        }
        .color-name {
            font-weight: bold;
            margin-bottom: 5px;
            color: #333;
        }
        .color-values {
            color: #666;
            line-height: 1.6;
        }
        .dot-preview {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-left: 5px;
            vertical-align: middle;
        }
        .dark-mode {
            background: #1a1a1a;
        }
        .dark-mode .mode-title {
            color: #fff;
            border-bottom-color: #444;
        }
        .dark-mode .color-item {
            border-color: #444;
        }
        .dark-mode .color-info {
            background: #2a2a2a;
        }
        .dark-mode .color-name {
            color: #fff;
        }
        .dark-mode .color-values {
            color: #aaa;
        }
    </style>
</head>
<body>
    <h1>🎨 彩条配色方案预览</h1>

    <!-- 白天模式 -->
    <div class="mode-section">
        <div class="mode-title">☀️ 白天模式</div>
        <div class="color-grid" id="lightMode"></div>
    </div>

    <!-- 黑夜模式 -->
    <div class="mode-section dark-mode">
        <div class="mode-title">🌙 黑夜模式</div>
        <div class="color-grid" id="darkMode"></div>
    </div>

    <script>
        // 白天模式配色
        const lightColors = [
            { name: '天青', bar: 'rgba(135, 205, 250, 0.38)', text: '#1e5a7a', dot: '#5eb8e8' },
            { name: '浅蓝', bar: 'rgba(200, 225, 255, 0.38)', text: '#4a6a8a', dot: '#8ec0f0' },
            { name: '浅粉', bar: 'rgba(255, 200, 220, 0.38)', text: '#b06080', dot: '#ffb0d0' },
            { name: '薄荷绿', bar: 'rgba(195, 245, 225, 0.38)', text: '#2d6850', dot: '#6dc49a' },
            { name: '薰衣草紫', bar: 'rgba(218, 200, 245, 0.38)', text: '#3d2d5c', dot: '#9d7ec9' },
            { name: '柠檬黄', bar: 'rgba(255, 245, 157, 0.38)', text: '#5c4d10', dot: '#e6c83d' },
            { name: '茶色', bar: 'rgba(215, 204, 200, 0.38)', text: '#5c4a28', dot: '#d2b48c' },
            { name: '橙色', bar: 'rgba(255, 220, 180, 0.38)', text: '#8a5a3a', dot: '#f0a070' },
            { name: '青绿', bar: 'rgba(128, 203, 196, 0.38)', text: '#00695c', dot: '#80CBC4' },
            { name: '棕色', bar: 'rgba(188, 170, 164, 0.38)', text: '#3e2723', dot: '#795548' },
            { name: '灰色', bar: 'rgba(210, 210, 210, 0.38)', text: '#5a5a5a', dot: '#c0c0c0' },
            { name: '红色', bar: 'rgba(255, 180, 180, 0.38)', text: '#8a4a4a', dot: '#e09090' },
            { name: '宝蓝', bar: 'rgba(120, 160, 255, 0.38)', text: '#3a5a9a', dot: '#6a9af0' },
            { name: '珊瑚粉', bar: 'rgba(255, 180, 150, 0.38)', text: '#9a5a4a', dot: '#f09070' },
            { name: '紫罗兰', bar: 'rgba(220, 190, 220, 0.38)', text: '#6a4a7a', dot: '#d0a8d0' },
            { name: '松绿', bar: 'rgba(100, 190, 140, 0.38)', text: '#2a6a4a', dot: '#5ac090' }
        ];

        // 黑夜模式配色
        const darkColors = [
            { name: '天青', bar: 'rgba(56, 189, 248, 0.5)', text: '#7dd3fc', dot: '#38bdf8' },
            { name: '浅蓝', bar: 'rgba(130, 200, 255, 0.5)', text: '#a8d8ff', dot: '#7ec8ff' },
            { name: '浅粉', bar: 'rgba(255, 190, 210, 0.5)', text: '#ffd0e0', dot: '#ffc0d8' },
            { name: '薄荷绿', bar: 'rgba(74, 222, 128, 0.5)', text: '#86efac', dot: '#4ade80' },
            { name: '薰衣草紫', bar: 'rgba(192, 132, 252, 0.5)', text: '#c4b5fd', dot: '#c084fc' },
            { name: '柠檬黄', bar: 'rgba(250, 204, 21, 0.5)', text: '#fde047', dot: '#facc15' },
            { name: '茶色', bar: 'rgba(245, 158, 11, 0.5)', text: '#fcd34d', dot: '#f59e0b' },
            { name: '橙色', bar: 'rgba(255, 180, 120, 0.5)', text: '#ffb080', dot: '#ffa060' },
            { name: '青绿', bar: 'rgba(94, 234, 212, 0.5)', text: '#99f6e4', dot: '#5eead4' },
            { name: '棕色', bar: 'rgba(168, 162, 158, 0.5)', text: '#d6d3d1', dot: '#a8a29e' },
            { name: '灰色', bar: 'rgba(180, 180, 180, 0.5)', text: '#c8c8c8', dot: '#b8b8b8' },
            { name: '红色', bar: 'rgba(255, 140, 140, 0.5)', text: '#ffb0b0', dot: '#ff9090' },
            { name: '宝蓝', bar: 'rgba(120, 160, 255, 0.5)', text: '#a8c8ff', dot: '#7ea8ff' },
            { name: '珊瑚粉', bar: 'rgba(255, 160, 130, 0.5)', text: '#ffd0b8', dot: '#ffb090' },
            { name: '紫罗兰', bar: 'rgba(220, 180, 230, 0.5)', text: '#f0d0f8', dot: '#e0b0e8' },
            { name: '松绿', bar: 'rgba(100, 210, 160, 0.5)', text: '#b8f8d8', dot: '#78e8b0' }
        ];

        function renderColors(colors, containerId, isDark) {
            const container = document.getElementById(containerId);
            colors.forEach((color, index) => {
                const item = document.createElement('div');
                item.className = 'color-item';
                item.innerHTML = `
                    <div class="color-bar" style="background-color: ${color.bar}; color: ${color.text};">
                        ${index}. ${color.name}
                        <span class="dot-preview" style="background-color: ${color.dot};"></span>
                    </div>
                    <div class="color-info">
                        <div class="color-name">${color.name}</div>
                        <div class="color-values">
                            背景: ${color.bar}<br>
                            文字: ${color.text}<br>
                            圆点: ${color.dot}
                        </div>
                    </div>
                `;
                container.appendChild(item);
            });
        }

        renderColors(lightColors, 'lightMode', false);
        renderColors(darkColors, 'darkMode', true);
    </script>
</body>
</html>
