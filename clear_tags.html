<!DOCTYPE html>
<html>
<head>
    <title>清除预设标签</title>
</head>
<body>
    <h1>清除预设标签</h1>
    <p>点击按钮清除本地存储中的预设标签数据：</p>
    <button onclick="clearTags()">清除预设标签</button>
    <p id="message"></p>

    <script>
        function clearTags() {
            localStorage.removeItem('mg_schedule_todo_preset_tags');
            document.getElementById('message').textContent = '预设标签已清除！请关闭此页面并重新打开标签编辑器。';
            console.log('预设标签已清除');
        }
    </script>
</body>
</html>
